<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekplanner – School</title>
  <link rel="stylesheet" href="../../../CSS/main.css" />
  <link rel="stylesheet" href="../../../CSS/components-menu.css" />
  <link rel="stylesheet" href="../../../CSS/components-sidemenu.css" />
  <link rel="stylesheet" href="./planner.css">
  <script>
    window.APP_ENV = "DEV"; 
    (function () {
      try {
        var pref = localStorage.getItem('theme_pref') || 'system';
        var final = pref === 'system'
          ? (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : pref;
        document.documentElement.setAttribute('data-theme', final);
      } catch (e) { }
    })();
  </script>
</head>
<body class="planner-page">

  <div data-include="../../../partials/header.html"></div>
  <div id="menu-container"></div>

  <main class="module-planner">
    <header class="planner-header">
      <div class="planner-toolbar">
        <!-- #examen-timer wordt hier dynamisch ingevoegd door JS -->
        <div class="toolbar-row">
          <div class="toolbar-nav">
            <button id="prevWeek" class="btn-icon">◀</button>
            <h2 id="weekTitle">Laden...</h2>
            <button id="nextWeek" class="btn-icon">▶</button>
            <button id="todayBtn" class="btn-today">Vandaag</button>
          </div>
          <div class="view-toggle">
            <button id="viewWeek" class="btn-text is-active">Week</button>
            <button id="viewDay" class="btn-text">Dag</button>
          </div>
          <div class="toolbar-actions">
            <button id="notifBtn" class="btn-outline" title="Herinneringen">🔔</button>
            <button id="printBtn" class="btn-outline" title="Afdrukken">🖨️</button>
            <button id="manageSubjectsBtn" class="btn-outline">📚 Vakken</button>
            <button id="newBacklogBtn" class="btn-primary">+ Nieuw item</button>
          </div>
        </div>
      </div>
    </header>

    <div class="page">
      <section class="leftcol">
        <div id="calendar" class="calendar-grid"></div>
      </section>

      <aside class="rightcol">
        <div class="backlog-card">
          <div class="card-header">
            <h3>Backlog</h3>
            <input type="text" id="backlog-search" class="backlog-search-input" placeholder="Zoeken...">
          </div>
          <div id="backlogGroups" class="backlog-content"></div>
        </div>
      </aside>
    </div>
  </main>

  <!-- Modal: Nieuw Item -->
  <div id="modal-backlog" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Nieuw item toevoegen</h3>
        <button class="modal-close" data-modal-close="modal-backlog">✕</button>
      </div>
      <div class="modal-body">
        <form id="bl-form">
          <div class="field">
            <label class="field-label">Titel</label>
            <input type="text" id="bl-title" required placeholder="Bijv. Hoofdstuk 1 lezen">
          </div>

          <div class="field">
            <label class="field-label">Vak</label>
            <select id="bl-subject" required></select>
          </div>

          <div class="field">
            <label class="field-label">Type</label>
            <div class="segmented-control">
              <button type="button" class="seg is-active" data-type="taak">📝 Taak</button>
              <button type="button" class="seg" data-type="toets">🧪 Toets</button>
              <button type="button" class="seg" data-type="examen">🎓 Examen</button>
            </div>
            <input type="hidden" id="bl-type" value="taak">
          </div>

          <div id="examen-fields" class="examen-fields-card" style="display:none">
            <div class="field">
              <label class="field-label">Hoofdstukken <span class="field-hint">(gescheiden door komma)</span></label>
              <input type="text" id="bl-chapters" placeholder="Bijv. H1, H2, H3">
            </div>
            <div class="field">
              <label class="field-label">Genereer per hoofdstuk</label>
              <div class="checkbox-group">
                <label class="cb-label"><input type="checkbox" class="ex-prefix" value="Samenvatting" checked> Samenvatting</label>
                <label class="cb-label"><input type="checkbox" class="ex-prefix" value="Leren" checked> Leren</label>
                <label class="cb-label"><input type="checkbox" class="ex-prefix" value="Herhalen" checked> Herhalen</label>
                <label class="cb-label"><input type="checkbox" class="ex-prefix" value="Oefeningen"> Oefeningen</label>
              </div>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Prioriteit</label>
            <div class="segmented-control">
              <button type="button" class="seg seg-pri" data-priority="laag">↓ Laag</button>
              <button type="button" class="seg seg-pri is-active" data-priority="normaal">— Normaal</button>
              <button type="button" class="seg seg-pri" data-priority="hoog">↑ Hoog</button>
            </div>
            <input type="hidden" id="bl-priority" value="normaal">
          </div>

          <div class="field">
            <label class="field-label">Deadline</label>
            <input type="date" id="bl-due" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-ghost" data-modal-close="modal-backlog">Annuleren</button>
        <button type="submit" form="bl-form" class="btn-primary">Opslaan</button>
      </div>
    </div>
  </div>

  <!-- Modal: Vakken Beheren -->
  <div id="modal-subjects" class="modal">
    <div class="modal-content modal-content--wide">
      <div class="modal-header">
        <h3>Vakken beheren</h3>
        <button class="modal-close" data-modal-close="modal-subjects">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="field-label">Naam vak</label>
          <div class="subject-name-row">
            <div id="sub-color-preview" class="color-preview"></div>
            <input type="text" id="sub-name" placeholder="Bijv. Wiskunde">
          </div>
        </div>
        <div class="field">
          <label class="field-label">Kleur</label>
          <div id="sub-palette" class="palette"></div>
        </div>
        <button id="sub-save" class="btn-primary">Vak toevoegen</button>

        <div class="modal-divider"></div>

        <table class="subjects-table">
          <thead>
            <tr>
              <th>Naam</th>
              <th>Kleur</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="subjectsTable"></tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button data-modal-close="modal-subjects" class="btn-ghost">Sluiten</button>
      </div>
    </div>
  </div>

  <!-- Modal: Nieuw blok in kalender -->
  <div id="modal-new-plan" class="modal">
    <div class="modal-content modal-content--plan">
      <div class="modal-header">
        <div>
          <div id="new-plan-time-label" class="plan-time-label"></div>
          <h3>Nieuw blok inplannen</h3>
        </div>
        <button class="modal-close" data-modal-close="modal-new-plan">✕</button>
      </div>
      <div class="plan-tabs">
        <button class="plan-tab is-active" data-tab="backlog">📚 Backlog</button>
        <button class="plan-tab" data-tab="free">✏️ Persoonlijk</button>
      </div>
      <div class="plan-time-bar">
        <input type="date" id="plan-start-date">
        <input type="time" id="plan-start-time" step="900">
        <span class="plan-time-arrow">→</span>
        <input type="time" id="plan-end-time" step="900">
      </div>
      <div class="modal-body">
        <!-- Tab: Backlog -->
        <div id="plan-tab-backlog" class="plan-tab-content">
          <input type="text" id="plan-bl-search" placeholder="Zoeken in backlog...">
          <div id="plan-bl-list" class="plan-bl-list"></div>
        </div>
        <!-- Tab: Persoonlijk -->
        <div id="plan-tab-free" class="plan-tab-content" style="display:none">
          <div class="field">
            <label class="field-label">Titel</label>
            <input type="text" id="plan-free-title" placeholder="Bijv. Voetbal, Tandarts...">
          </div>
          <div class="field">
            <label class="field-label">Type</label>
            <div class="segmented-control" id="plan-free-type-ctrl">
              <button type="button" class="seg is-active" data-ftype="afspraak">📅 Afspraak</button>
              <button type="button" class="seg" data-ftype="hobby">🎯 Hobby</button>
              <button type="button" class="seg" data-ftype="andere">📌 Andere</button>
            </div>
          </div>
          <div class="field">
            <label class="field-label">Kleur</label>
            <div id="plan-free-palette" class="palette"></div>
          </div>
          <div class="field">
            <label class="field-label">Herhaling</label>
            <select id="plan-recur-type">
              <option value="none">Geen herhaling</option>
              <option value="daily">Elke dag</option>
              <option value="weekly">Elke week</option>
              <option value="biweekly">Om de 2 weken</option>
              <option value="monthly">Elke maand</option>
              <option value="custom">Aangepast...</option>
            </select>
          </div>
          <div id="plan-recur-days" class="field" style="display:none">
            <label class="field-label">Op welke dag(en)</label>
            <div class="day-picker">
              <button type="button" class="day-btn" data-day="1">Ma</button>
              <button type="button" class="day-btn" data-day="2">Di</button>
              <button type="button" class="day-btn" data-day="3">Wo</button>
              <button type="button" class="day-btn" data-day="4">Do</button>
              <button type="button" class="day-btn" data-day="5">Vr</button>
              <button type="button" class="day-btn" data-day="6">Za</button>
              <button type="button" class="day-btn" data-day="0">Zo</button>
            </div>
          </div>
          <div id="plan-recur-custom" class="field" style="display:none">
            <label class="field-label">Interval</label>
            <div class="recur-custom-row">
              <span>Elke</span>
              <input type="number" id="plan-recur-interval" min="1" max="30" value="1">
              <select id="plan-recur-unit">
                <option value="day">dag(en)</option>
                <option value="week">week/weken</option>
                <option value="month">maand(en)</option>
              </select>
            </div>
          </div>
          <div id="plan-recur-end-field" class="field" style="display:none">
            <label class="field-label">Herhalen t/m</label>
            <input type="date" id="plan-recur-end">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-ghost" data-modal-close="modal-new-plan">Annuleren</button>
        <button type="button" id="plan-save-btn" class="btn-primary">Inplannen</button>
      </div>
    </div>
  </div>

  <!-- Pomodoro Timer Panel -->
  <div id="pomodoro-panel" class="pomodoro-panel">
    <div class="pomo-header">
      <span>⏱️ Studie-timer</span>
      <button id="pomo-close" class="pomo-btn-icon">✕</button>
    </div>
    <div id="pomo-title" class="pomo-title"></div>
    <div id="pomo-time" class="pomo-time">25:00</div>
    <div class="pomo-controls">
      <button id="pomo-pause" class="btn-text">⏸ Pauze</button>
      <button id="pomo-stop" class="btn-text">⏹ Stop</button>
    </div>
  </div>

  <!-- Modal: Blok bewerken -->
  <div id="modal-edit-plan" class="modal">
    <div class="modal-content modal-content--plan">
      <div class="modal-header">
        <div>
          <div id="edit-plan-subtitle" class="plan-time-label"></div>
          <h3>Blok bewerken</h3>
        </div>
        <button class="modal-close" data-modal-close="modal-edit-plan">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="field">
            <label class="field-label">Datum</label>
            <input type="date" id="edit-plan-date">
          </div>
          <div class="field">
            <label class="field-label">Tijd</label>
            <input type="time" id="edit-plan-time" step="900">
          </div>
        </div>
        <div class="field">
          <label class="field-label">Kleur</label>
          <div id="edit-plan-palette" class="palette"></div>
        </div>
        <div class="field">
          <label class="field-label">Notities</label>
          <textarea id="edit-plan-notes" rows="3" placeholder="Voeg een notitie toe..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" data-modal-close="modal-edit-plan">Annuleren</button>
        <button id="edit-plan-save" class="btn-primary">Opslaan</button>
      </div>
    </div>
  </div>

  <!-- Modal: Dupliceren / Verplaatsen -->
  <div id="modal-replan" class="modal">
    <div class="modal-content modal-content--plan">
      <div class="modal-header">
        <div>
          <div id="replan-subtitle" class="plan-time-label"></div>
          <h3 id="replan-title">Dupliceren naar</h3>
        </div>
        <button class="modal-close" data-modal-close="modal-replan">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="field">
            <label class="field-label">Datum</label>
            <input type="date" id="replan-date">
          </div>
          <div class="field">
            <label class="field-label">Tijd</label>
            <input type="time" id="replan-time" step="900">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" data-modal-close="modal-replan">Annuleren</button>
        <button id="replan-save" class="btn-primary">Opslaan</button>
      </div>
    </div>
  </div>

  <!-- Scripts Sectie -->
<script src="../../../script/javascript/include-partials.js"></script>
  <script type="module" src="../../../src/components/navigation.js"></script>
  <script type="module" src="./planner.js"></script>
</body>
</html>
